name: CI

on:
  push:
  pull_request:

jobs:
  formatting:
    name: Formatting (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check docs / quality files
        run: composer quality:docs

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check code style (Pint)
        run: composer quality:lint

  static-analysis:
    name: Static Analysis (PHPStan / Larastan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/testing.sqlite

      - name: Generate app key (testing)
        run: php artisan key:generate --env=testing

      - name: Migrate & seed (testing)
        run: |
          php artisan migrate --env=testing --force
          php artisan db:seed --env=testing --force

      - name: Run static analysis
        run: composer quality:analyse

  automated-tests:
    name: Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/testing.sqlite

      - name: Generate app key (testing)
        run: php artisan key:generate --env=testing

      - name: Migrate & seed (testing)
        run: |
          php artisan migrate --env=testing --force
          php artisan db:seed --env=testing --force

      - name: Run tests
        run: composer quality:test

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run dependency audit (warning only)
        run: composer quality:audit
